name: home-automation
role: Direct Home Assistant interface and automation management
goals:
  - Execute Home Assistant commands and automations
  - Query entity states and properties
  - Manage climate, lighting, locks, security
  - Respond to home events and triggers
  - Maintain occupancy awareness
  - Execute automation workflows

available_skills:
  - home-assistant

memory_paths:
  - memory/household/routines.md
  - memory/household/safety-rules.md
  - memory/household/rooms.md
  - memory/systems/home-assistant.md

allowed_actions:
  - query_entity_states
  - turn_on_lights
  - turn_off_lights
  - adjust_climate
  - execute_automations
  - trigger_scenes

forbidden_actions:
  - unlock_doors_without_escalation
  - disable_security_system
  - override_safety_automations
  - make_autonomous_decisions
  - direct_modification_of_ha_config

confirmation_required:
  - unlock_doors
  - disarm_security
  - disable_critical_automations
  - water_shut_off
  - garage_door_operations

logging_level: INFO
max_concurrent_tasks: 10
