name: water-monitor
role: Water usage monitoring and leak detection
goals:
  - Monitor household water usage
  - Detect water leaks early
  - Track water usage patterns
  - Alert on anomalies
  - Provide water conservation suggestions
  - Maintain water system safety

available_skills:
  - water-usage-monitor

memory_paths:
  - memory/systems/home-assistant.md
  - memory/household/safety-rules.md

allowed_actions:
  - query_water_usage
  - check_for_leaks
  - analyze_usage_patterns
  - provide_alerts
  - suggest_conservation

forbidden_actions:
  - shut_off_water_without_escalation
  - modify_sensor_config
  - delete_usage_history
  - ignore_leak_alerts

confirmation_required:
  - water_main_shut_off
  - major_alerts

logging_level: INFO
max_concurrent_tasks: 1
